<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시계 타이머</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f8;
    text-align: center;
    margin: 0;
    padding: 30px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .container {
    background: white;
    width: 380px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  .time-inputs {
    margin-bottom: 15px;
  }

  input[type="time"] {
    padding: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  label {
    display: block;
    margin: 8px 0;
    font-size: 14px;
  }

  .quick-buttons button {
    background: #e0e7ff;
    border: none;
    border-radius: 10px;
  }

  button {
    margin: 5px;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: #4f46e5;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #3730a3;
  }

  canvas {
    margin-top: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  }

  #extraTime {
    margin-top: 15px;
    font-size: 14px;
    color: #444;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

<div class="container">

  <h1>시계 타이머</h1>

  <div class="time-inputs">
    시작 시간: <input type="time" id="startTime"><br><br>
    끝 시간: <input type="time" id="endTime">
  </div>

  <label>
    <input type="checkbox" id="showTime" checked>
    경과/남은 시간 표시
  </label>

  <label>
    <input type="checkbox" id="showMs">
    소수점 표시
  </label>

  <div class="quick-buttons">
    <button onclick="quickSet('08:40','10:00')">국어</button>
    <button onclick="quickSet('10:30','12:10')">수학</button>
    <button onclick="quickSet('13:10','14:20')">영어</button>
    <button onclick="quickSet('15:35','16:05')">탐구1</button>
    <button onclick="quickSet('16:07','16:37')">탐구2</button>
  </div>

  <br>

  <button onclick="startTimer()">시작</button>
  <button id="pauseBtn" onclick="pauseTimer()">일시정지</button>
  <button onclick="resetTimer()">초기화</button>

  <canvas id="clockCanvas" width="300" height="300"></canvas>

  <div id="extraTime">
    <div>경과: <span id="elapsed"></span></div>
    <div>남은: <span id="remaining"></span></div>
  </div>

</div>

<audio id="bell" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
  
<script>
let timer;
let wakeLock = null;
let startMs, endMs, duration;
let startedAt;
let pausedAt = 0;
let isPaused = false;
let warned = false;
let ended = false;
let audioUnlocked = false;

const canvas = document.getElementById("clockCanvas");
const ctx = canvas.getContext("2d");

function timeToMs(t) {
  let [h, m] = t.split(":").map(Number);
  return (h * 3600 + m * 60) * 1000;
}

function format(ms, showMs) {
  let totalSec = ms / 1000;
  let h = Math.floor(totalSec / 3600);
  let m = Math.floor((totalSec % 3600) / 60);
  let s = Math.floor(totalSec % 60);

  if (showMs) {
    let msPart = Math.floor(ms % 1000);
    return `${pad(h)}:${pad(m)}:${pad(s)}.${msPart}`;
  }
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function pad(n) {
  return n.toString().padStart(2, "0");
}

function startTimer() {
  unlockAudio();
  clearInterval(timer);
  disableWakeLock();

  const startInput = document.getElementById("startTime").value;
  const endInput = document.getElementById("endTime").value;

  if (!startInput || !endInput) {
    alert("시간을 입력해 주세요");
    return;
  }

  startMs = timeToMs(startInput);
  endMs = timeToMs(endInput);
  duration = endMs - startMs;

  if (duration <= 0) {
    alert("끝시간이 더 커야합니다");
    return;
  }

  startedAt = performance.now();
  document.getElementById("pauseBtn").textContent = "⏸";
  enableWakeLock();
  pausedAt = 0;
  isPaused = false;
  warned = false;
  ended = false;

  timer = setInterval(update, 16);
}

function pauseTimer() {
  if (!timer) return;

  const btn = document.getElementById("pauseBtn");

  if (!isPaused) {
    clearInterval(timer);
    pausedAt = performance.now();
    isPaused = true;
    btn.textContent = "▶";
  } else {
    let pauseDuration = performance.now() - pausedAt;
    startedAt += pauseDuration;
    timer = setInterval(update, 16);
    isPaused = false;
    btn.textContent = "⏸";
  }
}

function resetTimer() {
  clearInterval(timer);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  document.getElementById("elapsed").textContent = "";
  document.getElementById("remaining").textContent = "";

  warned = false;
  ended = false;
  document.getElementById("pauseBtn").textContent = "⏸";
  isPaused = false;
  disableWakeLock();
}

function update() {
  const now = performance.now();
  const elapsedReal = now - startedAt;

  let progress = elapsedReal / duration;
  if (progress > 1) progress = 1;

  let current = startMs + duration * progress;

  drawClock(current);

  const showMs = document.getElementById("showMs").checked;
  const showTime = document.getElementById("showTime").checked;

  const elapsed = current - startMs;
  const remaining = endMs - current;

  const extra = document.getElementById("extraTime");
  extra.classList.toggle("hidden", !showTime);

  if (showTime) {
    document.getElementById("elapsed").textContent = format(elapsed, showMs);
    document.getElementById("remaining").textContent = format(remaining, showMs);
  }

  if (!warned && remaining <= 10 * 60 * 1000) {
    ringBell();
    warned = true;
  }

  if (!ended && progress >= 1) {
    ringBell();
    ended = true;
    clearInterval(timer);
    disableWakeLock();
  }
}
  
async function enableWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log("화면 꺼짐 방지 활성화");
    }
  } catch (err) {
    console.log("WakeLock 실패:", err);
  }
}

async function disableWakeLock() {
  if (wakeLock !== null) {
    await wakeLock.release();
    wakeLock = null;
    console.log("화면 꺼짐 방지 해제");
  }
}

function drawClock(ms) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let totalSec = ms / 1000;
  let h = totalSec / 3600;
  let m = (totalSec % 3600) / 60;
  let s = totalSec % 60;

  let cx = 150, cy = 150;

  // 테두리
  ctx.beginPath();
  ctx.arc(cx, cy, 140, 0, Math.PI * 2);
  ctx.stroke();

  // 숫자 (1~12)
  ctx.font = "16px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let i = 1; i <= 12; i++) {
    let angle = (Math.PI / 6) * (i - 3);
    let x = cx + Math.cos(angle) * 120;
    let y = cy + Math.sin(angle) * 120;
    ctx.fillText(i, x, y);
  }

  // 바늘
  drawHand(cx, cy, h * 30, 60, 6);   // 시침
  drawHand(cx, cy, m * 6, 90, 4);    // 분침
  drawHand(cx, cy, s * 6, 110, 1);   // 초침
}

function drawHand(cx, cy, deg, length, width) {
  let rad = (Math.PI / 180) * (deg - 90);
  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(rad) * length, cy + Math.sin(rad) * length);
  ctx.stroke();
}

function ringBell() {
  const bell = document.getElementById("bell");
  bell.currentTime = 0;
  bell.play().catch(() => {});
}

function quickSet(start, end) {
  document.getElementById("startTime").value = start;
  document.getElementById("endTime").value = end;
}

function unlockAudio() {
  if (audioUnlocked) return;

  const bell = document.getElementById("bell");
  bell.play().then(() => {
    bell.pause();
    bell.currentTime = 0;
    audioUnlocked = true;
  }).catch(() => {});
}

</script>

</body>
</html>
